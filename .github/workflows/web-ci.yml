name: Web CI

on:
  push:
    paths:
      - "church-erp-web/**"
      - ".github/workflows/web-ci.yml"
  pull_request:
    paths:
      - "church-erp-web/**"
      - ".github/workflows/web-ci.yml"

jobs:
  quality:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: church-erp-web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: church-erp-web/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
