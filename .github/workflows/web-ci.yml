name: Web CI

on:
  push:
    paths:
      - "church-erp-web/**"
      - ".github/workflows/web-ci.yml"
  pull_request:
    paths:
      - "church-erp-web/**"
      - ".github/workflows/web-ci.yml"

permissions:
  contents: read

concurrency:
  group: web-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: church-erp-web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: church-erp-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        env:
          API_BASE_URL: http://localhost:8000
          INTERNAL_API_AUDIENCE: church-erp-api
          INTERNAL_API_ISSUER: church-erp-web
        run: npm run build
