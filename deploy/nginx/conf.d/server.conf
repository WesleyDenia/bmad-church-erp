upstream web_dev {
    server web-dev:3000;
}

upstream web_stg {
    server web-stg:3000;
}

upstream web_prod {
    server web-prod:3000;
}

upstream api_dev {
    server api-dev:8000;
}

upstream api_stg {
    server api-stg:8000;
}

upstream api_prod {
    server api-prod:8000;
}

server {
    listen 80;
    server_name dev.teudominio.pt;

    location / {
        proxy_pass http://web_dev;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

server {
    listen 80;
    server_name stg.teudominio.pt;

    location / {
        proxy_pass http://web_stg;
